<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>電車の椅子取りゲーム</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-wrap" aria-label="電車の椅子取りゲーム">
        <div class="topbar">
          <div>
            <p class="kicker">Yamanote Seat Rush</p>
            <h1>電車の椅子取りゲーム</h1>
          </div>
          <div class="stats" aria-live="polite">
            <span>Score <strong id="score">0</strong></span>
            <span>Combo <strong id="combo">0</strong></span>
            <span>Station <strong id="station">1</strong></span>
          </div>
        </div>

        <canvas id="game" width="960" height="540" aria-label="ゲーム画面"></canvas>

        <div class="controls">
          <button id="leftBtn" type="button" aria-label="左へ移動">←</button>
          <button id="sitBtn" type="button">SIT</button>
          <button id="rightBtn" type="button" aria-label="右へ移動">→</button>
        </div>

        <div class="meter-row">
          <div class="meter-label">混雑率</div>
          <div class="meter"><span id="crowdMeter"></span></div>
          <button id="startBtn" type="button">START</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
